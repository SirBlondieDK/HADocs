name: HADocs
version: "0.2.1"
slug: hadocs
description: Generate local documentation and health analysis for Home Assistant
url: https://github.com/SirBlondieDK/HADocs
stage: experimental

startup: application
boot: auto
init: false

arch:
  - amd64
  - aarch64

homeassistant_api: true

ingress: true
ingress_port: 8099
panel_icon: mdi:file-document-multiple
panel_title: HADocs

map:
  - type: share
    read_only: false
  - type: addon_config
    read_only: false

options:
  project_name: My Smart Home
  output_directory: /share/hadocs
  scan_on_start: false

schema:
  project_name: str
  output_directory: str
  scan_on_start: bool
