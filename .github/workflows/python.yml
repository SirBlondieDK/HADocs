name: Python

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"

  pull_request:

jobs:
  build:

    runs-on: windows-latest

    strategy:
      matrix:
        python-version: ["3.14"]

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install HADocs
        run: pip install .

      - name: Compile
        run: python -m compileall src

      - name: CLI Help
        run: python -m src.hadocs.cli.main --help